<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>QR Scanner PRO</title>

<!-- Fuente robótica -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<!-- Librería QR -->
<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<style>
  body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: linear-gradient(270deg, #ff6600, #ffffff);
    background-size: 400% 400%;
    animation: bgMove 10s infinite alternate;
    color: #222;
    text-align: center;
  }

  @keyframes bgMove {
    0% {background-position: 0%}
    100% {background-position: 100%}
  }

  h1 {
    margin-top: 20px;
    animation: glow 2s infinite alternate;
  }

  @keyframes glow {
    from { text-shadow: 0 0 10px #ff6600; }
    to { text-shadow: 0 0 30px #ff6600, 0 0 50px #ff3300; }
  }

  #video {
    width: 320px;
    border: 4px solid #ff6600;
    border-radius: 10px;
    margin-top: 20px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.03); }
    100% { transform: scale(1); }
  }

  #result {
    margin-top: 20px;
    font-size: 18px;
    padding: 10px;
    background: white;
    border-radius: 10px;
    display: inline-block;
    animation: fadeIn 1s ease;
  }

  @keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
  }

  button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    background: #ff6600;
    color: white;
    font-family: 'Orbitron', sans-serif;
    cursor: pointer;
    border-radius: 8px;
    transition: 0.3s;
  }

  button:hover {
    background: #ff3300;
    transform: scale(1.1) rotate(-1deg);
  }

  canvas {
    display: none;
  }

  /* Línea de escaneo animada */
  .scanner-line {
    position: absolute;
    width: 320px;
    height: 3px;
    background: red;
    animation: scan 2s infinite;
  }

  @keyframes scan {
    0% { transform: translateY(0); }
    100% { transform: translateY(300px); }
  }

  .video-container {
    position: relative;
    display: inline-block;
  }

</style>
</head>

<body>

<h1>QR SCANNER PRO</h1>

<div class="video-container">
  <video id="video" autoplay></video>
  <div class="scanner-line"></div>
</div>

<br>
<button onclick="startCamera()">INICIAR CÁMARA</button>

<p id="result">Esperando QR...</p>

<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const result = document.getElementById("result");

function startCamera() {
  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => {
      video.srcObject = stream;
      requestAnimationFrame(scanQR);
    });
}

function scanQR() {
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, canvas.width, canvas.height);

    if (code) {
      result.textContent = "Resultado: " + code.data;
      result.style.animation = "glow 1s infinite alternate";
    }
  }
  requestAnimationFrame(scanQR);
}

// PEGAR IMAGEN DESDE PORTAPAPELES
document.addEventListener("paste", function(event) {
  const items = event.clipboardData.items;

  for (let i = 0; i < items.length; i++) {
    if (items[i].type.indexOf("image") !== -1) {
      const blob = items[i].getAsFile();
      const img = new Image();

      img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, canvas.width, canvas.height);

        if (code) {
          result.textContent = "Resultado: " + code.data;
        } else {
          result.textContent = "No se detectó QR.";
        }
      };

      img.src = URL.createObjectURL(blob);
    }
  }
});
</script>

</body>
</html>
